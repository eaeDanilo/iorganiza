<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0066FF"/>
      <stop offset="50%" stop-color="#6B2EE6"/>
      <stop offset="100%" stop-color="#FF0055"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0066FF" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#FF0055" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" ry="112" fill="#000000"/>

  <!-- Subtle gradient overlay -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#g2)"/>

  <!-- Border -->
  <rect x="1.5" y="1.5" width="509" height="509" rx="111" ry="111"
        fill="none" stroke="url(#g1)" stroke-width="1.5" opacity="0.35"/>

  <!-- "i" dot -->
  <circle cx="172" cy="148" r="28" fill="url(#g1)"/>

  <!-- "i" stem -->
  <rect x="148" y="200" width="48" height="184" rx="24" ry="24" fill="url(#g1)"/>

  <!-- "O" ring -->
  <circle cx="330" cy="280" r="112" fill="none" stroke="url(#g1)" stroke-width="48"/>
</svg>
